                    {
                      "type": "array",
                      "items":
                        {
                          "$ref": "#/components/schemas/TransactionHistoryResponseDto",
                        },
                    },
                  "fromSystemWalletType":
                    { "type": "string", "enum": ["hot", "cold", "warm"] },
                  "toSystemWalletType":
                    { "type": "string", "enum": ["hot", "cold", "warm"] },
                  "nativeToken":
                    { "$ref": "#/components/schemas/SymbolResponseDto" },
                  "organization":
                    { "$ref": "#/components/schemas/OrganizationResponseDto" },
                },
              "required":
                [
                  "id",
                  "asset",
                  "type",
                  "status",
                  "amount",
                  "fee",
                  "createdAt",
                  "organization",
                ],
            },
