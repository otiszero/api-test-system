                      "example": "2025-01-01T00:00:00Z",
                    },
                  "txHash": { "type": "string" },
                  "fromAddress": { "type": "string" },
                  "toAddress": { "type": "string" },
                  "fromVaultAccount":
                    { "$ref": "#/components/schemas/VaultAccountResponseDto" },
                  "toVaultAccount":
                    { "$ref": "#/components/schemas/VaultAccountResponseDto" },
                  "adminRemark": { "type": "string" },
