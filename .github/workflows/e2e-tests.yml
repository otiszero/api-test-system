name: E2E Tests

on:
  push:
    branches: [main, feat/e2e]
    paths:
      - 'e2e/**'
      - 'config/e2e*'
      - 'config/suites*'
  pull_request:
    branches: [main]
    paths:
      - 'e2e/**'
      - 'config/e2e*'
      - 'config/suites*'

env:
  E2E_HEADLESS: 'true'

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install chromium --with-deps

      - name: Generate E2E specs from features
        run: npx tsx e2e/generator/generator.ts

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts
        env:
          E2E_APP_URL: ${{ vars.E2E_APP_URL || '' }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-html-report
          path: reports/e2e/
          retention-days: 14

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces
          path: e2e/test-results/
          retention-days: 7
