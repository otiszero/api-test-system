<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Workflow — API Test System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #030712; color: #e5e7eb; padding: 20px; min-height: 100vh; }
  
  h1 { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #9ca3af; margin-bottom: 20px; }
  
  .phase { border-radius: 12px; border: 1px solid; overflow: hidden; margin-bottom: 12px; }
  .phase-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
  .phase-header:hover { filter: brightness(1.1); }
  .phase-title { display: flex; align-items: center; gap: 10px; }
  .phase-title span.icon { font-size: 1.3rem; }
  .phase-title .name { font-weight: 700; color: #fff; font-size: 0.95rem; }
  .phase-title .time { font-size: 0.75rem; color: #9ca3af; margin-left: 8px; }
  .phase-dots { display: flex; gap: 4px; }
  .phase-dots .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-ai { background: #22d3ee; }
  .dot-human { background: #f472b6; }
  
  .phase-body { padding: 8px; display: none; }
  .phase.open .phase-body { display: block; }
  
  .step { border: 1px solid #1f2937; border-radius: 8px; overflow: hidden; margin-bottom: 6px; }
  .step-header { padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
  .step-header:hover { background: rgba(255,255,255,0.03); }
  .step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
  .step-num.ai { background: rgba(34,211,238,0.15); color: #22d3ee; border: 1px solid rgba(34,211,238,0.3); }
  .step-num.human { background: rgba(244,114,182,0.15); color: #f472b6; border: 1px solid rgba(244,114,182,0.3); }
  .step-info { flex: 1; min-width: 0; }
  .step-cmd { font-family: monospace; font-size: 0.8rem; font-weight: 700; color: #22d3ee; }
  .step-cmd.human-cmd { color: #f472b6; }
  .step-name { font-size: 0.85rem; color: #fff; font-weight: 500; margin-left: 6px; }
  .step-what { font-size: 0.75rem; color: #6b7280; margin-top: 2px; }
  .step-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 999px; }
  .badge-ai { background: rgba(34,211,238,0.15); color: #22d3ee; }
  .badge-human { background: rgba(244,114,182,0.15); color: #f472b6; }
  .step-time { font-size: 0.7rem; color: #6b7280; }
  
  .step-detail { border-top: 1px solid #1f2937; padding: 12px; background: rgba(17,24,39,0.5); display: none; }
  .step.open .step-detail { display: block; }
  
  .detail-section { margin-bottom: 10px; }
  .detail-label { font-size: 0.7rem; font-weight: 700; margin-bottom: 4px; }
  .detail-label.ai-label { color: #22d3ee; }
  .detail-label.human-label { color: #f472b6; }
  .detail-label.output-label { color: #6b7280; }
  .detail-item { font-size: 0.75rem; color: #d1d5db; padding-left: 12px; margin-bottom: 2px; }
  .detail-item::before { content: "→ "; color: #4b5563; }
  
  .terminal { background: #020617; border: 1px solid #1f2937; border-radius: 8px; padding: 12px; margin: 8px 0; overflow-x: auto; }
  .terminal pre { font-family: monospace; font-size: 0.75rem; color: #4ade80; white-space: pre-wrap; line-height: 1.6; }
  
  .tip { background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.2); border-radius: 6px; padding: 8px; font-size: 0.75rem; color: #fbbf24; margin: 8px 0; }
  
  .decision { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: 6px; padding: 8px; margin: 8px 0; }
  .decision-q { font-size: 0.75rem; font-weight: 700; color: #60a5fa; margin-bottom: 4px; }
  .decision-opt { font-size: 0.75rem; padding-left: 12px; margin-bottom: 2px; }
  .decision-yes { color: #4ade80; }
  .decision-no { color: #fbbf24; }
  
  .output-line { font-size: 0.75rem; color: #4ade80; }
  .output-line span { color: #6b7280; }
  
  .cheatsheet { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; margin-top: 20px; }
  .cheatsheet h3 { font-size: 0.9rem; color: #fff; margin-bottom: 12px; }
  .cheatsheet-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 768px) { .cheatsheet-grid { grid-template-columns: 1fr; } }
  .cheatsheet-col { background: #030712; border-radius: 8px; padding: 12px; }
  .cheatsheet-col h4 { font-size: 0.8rem; color: #9ca3af; margin-bottom: 8px; }
  .cheatsheet-col .cmd { font-family: monospace; font-size: 0.8rem; color: #22d3ee; line-height: 1.8; }
  .cheatsheet-col .human-note { font-family: sans-serif; font-size: 0.75rem; color: #f472b6; margin-left: 8px; }
  .cheatsheet-col .comment { font-family: sans-serif; font-size: 0.7rem; color: #4b5563; margin-left: 8px; }

  .legend { margin-top: 12px; display: flex; gap: 16px; align-items: center; font-size: 0.75rem; color: #6b7280; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
</style>
</head>
<body>

<h1>Complete QC Workflow</h1>
<p class="subtitle">Từ zero đến production — step by step</p>

<div id="app"></div>

<script>
const data = [
  {
    phase: "PHASE 1: SETUP (Lần đầu tiên)",
    icon: "🏗️", color: "#6366f1", time: "1-3 giờ (one-time)",
    steps: [
      { n:1, who:"ai", cmd:"/init", title:"Khởi tạo project", time:"1 phút",
        what:"Gõ /init trong Claude Code terminal",
        ai:["Tạo toàn bộ folder structure","Tạo config templates với hướng dẫn","Install dependencies (vitest, axios, ajv...)","Tạo vitest.config.ts"],
        output:"Folder structure + 4 config files (còn trống)",
        term:`$ claude "/init"\n\n🏗️  Initializing project...\n\n✅ Created: config/api.config.json\n✅ Created: config/auth.config.json\n✅ Created: config/db.config.json\n✅ Created: config/test-rules.md\n✅ Created: input/ (put your openapi.yaml here)\n✅ Installed: vitest, axios, ajv, ajv-formats\n\n📋 Next: Điền config files rồi chạy /assess`},
      { n:2, who:"human", cmd:null, title:"Copy OpenAPI spec vào input/", time:"1 phút",
        what:"Copy file openapi.yaml vào thư mục input/",
        human:["Lấy OpenAPI spec từ team backend (file hoặc URL)","Copy vào input/openapi.yaml","Nếu có DB schema → copy vào input/db-schema.sql"],
        output:"input/openapi.yaml có nội dung",
        term:`$ cp ~/Downloads/openapi.yaml ./input/\n$ cp ~/Downloads/schema.sql ./input/db-schema.sql  # optional`,
        tip:"Nếu backend dùng Swagger UI, export từ /api-docs. Nếu dùng Postman, export OpenAPI 3.0."},
      { n:3, who:"human", cmd:null, title:"Điền config/api.config.json", time:"2 phút",
        what:"Mở file, điền baseUrl và headers",
        human:["baseUrl: URL của API server test environment","headers: thêm custom headers nếu cần","timeout: thường để 30000 (30s)"],
        output:"api.config.json đã điền",
        term:`{\n  "baseUrl": "https://api-staging.myapp.com/v1",\n  "timeout": 30000,\n  "headers": {\n    "Content-Type": "application/json"\n  }\n}`,
        tip:"Dùng staging/test environment, KHÔNG dùng production."},
      { n:4, who:"human", cmd:null, title:"Điền config/auth.config.json", time:"10-15 phút",
        what:"Điền auth type, roles, và test accounts",
        human:["Chọn auth type (bearer/api_key/basic)","Liệt kê tất cả roles trong hệ thống","Tạo/điền test account cho MỖI role","Quan trọng: tạo 2 user accounts (user_a, user_b) cho IDOR test"],
        output:"auth.config.json với đủ roles + accounts",
        term:`"roles": {\n  "admin":  { "level": 1 },\n  "editor": { "level": 2 },\n  "user":   { "level": 3 }\n},\n"accounts": {\n  "admin":  { "email": "admin@test.com", "password": "..." },\n  "user_a": { "email": "usera@test.com", "password": "...", "role": "user" },\n  "user_b": { "email": "userb@test.com", "password": "...", "role": "user" }\n}`,
        tip:"Nếu chưa có test accounts, nhờ backend tạo hoặc dùng seed script."},
      { n:5, who:"human", cmd:null, title:"Điền config/db.config.json (optional)", time:"5 phút",
        what:"Điền DB connection nếu có access",
        human:["enabled: true nếu có DB access, false nếu không","Điền connection string"],
        output:"db.config.json (hoặc enabled: false)",
        tip:"Không có DB access? Set enabled: false. Vẫn test được API, chỉ thiếu DB verification."},
      { n:6, who:"human", cmd:null, title:"Điền config/test-rules.md", time:"30 phút - 2 giờ",
        what:"Viết business rules, permission matrix, test scenarios",
        human:["Business rules (order total = sum items, stock >= 0...)","Resource relationships (delete user → orders ra sao?)","Validation rules (email unique, password 8+ chars...)","Permission matrix (endpoint × role bảng ✅❌🔒)","State machines (order: PENDING → CONFIRMED → ...)","Integration scenarios (viết flow bằng tiếng Việt)"],
        output:"test-rules.md có nội dung thật",
        term:`## Business Rules\n- Order total = sum(item.price × item.qty) - discount\n- Stock không được < 0\n\n## Permission Matrix\n| Endpoint           | admin | editor | user | guest |\n|--------------------|:-----:|:------:|:----:|:-----:|\n| POST /products     |  ✅   |   ✅   |  ❌  |  ❌   |\n| GET  /products     |  ✅   |   ✅   |  ✅  |  ✅   |\n| PUT  /products/:id |  ✅   |   🔒   |  ❌  |  ❌   |`,
        tip:"File QUAN TRỌNG NHẤT. Viết càng nhiều → AI test càng tốt. Viết dần, mỗi lần thêm → /assess lại."},
      { n:7, who:"ai", cmd:"/assess", title:"Đánh giá config", time:"30 giây",
        what:"Gõ /assess để kiểm tra config đã đủ chưa",
        ai:["Đọc tất cả config files","Check từng file: tồn tại? đã điền? hợp lệ?","Thử connect API, DB (nếu có)","Thử login từng account","Tính coverage estimate cho từng test layer","Liệt kê action items để cải thiện"],
        output:"Scorecard + coverage estimate + action items",
        term:`$ claude "/assess"\n\n📊 OVERALL READINESS: ████████████░░░  78/100\n\n┌──────────────────┬────────┬─────────────────────────┐\n│ Config           │ Score  │ Status                  │\n├──────────────────┼────────┼─────────────────────────┤\n│ OpenAPI Spec     │  9/10  │ ✅ 23 endpoints found   │\n│ API Config       │  5/5   │ ✅ Connected             │\n│ Auth Config      │  8/10  │ ⚠️ Thiếu guest account  │\n│ DB Config        │ 10/10  │ ✅ Connected             │\n│ Test Rules       │ 12/20  │ ⚠️ Thiếu state machine  │\n│ DB Schema        │  5/5   │ ✅ 12 tables             │\n└──────────────────┴────────┴─────────────────────────┘\n\n⚡ TOP ACTIONS:\n1. Thêm state machine vào test-rules.md (+8%)\n2. Viết 2-3 integration scenarios (+12%)`,
        tip:"Score < 50? Fix config trước. Score > 80? Ready to go.",
        decision:{q:"Score đủ chưa?",yes:"→ Tiếp tục Phase 2",no:"→ Quay lại fix config (step 3-6) → /assess lại"}},
    ]
  },
  {
    phase: "PHASE 2: ANALYZE & GENERATE",
    icon: "⚡", color: "#22c55e", time: "30 phút - 1 giờ",
    steps: [
      { n:8, who:"ai", cmd:"/analyze", title:"Phân tích OpenAPI spec", time:"2-5 phút",
        what:"AI đọc spec, build dependency graph, sinh test plan",
        ai:["Parse tất cả endpoints, schemas, auth requirements","Build resource dependency graph","Estimate test cases per layer","Generate test-plan.md"],
        output:"generated/test-plan.md + dependency-graph.json",
        term:`$ claude "/analyze"\n\n🔍 Analyzing OpenAPI spec...\n\n📋 RESOURCES: Users (5), Products (6), Orders (7)\n🔗 ORDER: Users → Categories → Products → Orders → Payments\n\n📊 ESTIMATED TESTS:\n   🟢 Smoke: 15      🔐 RBAC: 132\n   🔵 Contract: 23   ⚫ Security: 42\n   🟡 Single: 310    🟣 DB: 28\n   🟠 Integration: 18\n   Total: ~568 tests | ~20 min runtime`},
      { n:9, who:"ai", cmd:"/generate-all", title:"Sinh toàn bộ tests", time:"10-30 phút",
        what:"AI generate tests cho tất cả layers",
        ai:["Generate smoke → contract → single → integration → rbac → security → db","Skip layer nào thiếu config (cảnh báo, không crash)","Dùng realistic test data (faker)"],
        output:"Toàn bộ test files trong generated/tests/",
        term:`$ claude "/generate-all"\n\n🚀 GENERATING ALL TESTS...\n\n[1/7] 🟢 Smoke.............. ✅  15 tests\n[2/7] 🔵 Contract........... ✅  23 tests\n[3/7] 🟡 Single API......... ✅ 310 tests\n[4/7] 🟠 Integration........ ✅  18 tests\n[5/7] 🔐 RBAC............... ✅ 132 tests\n[6/7] ⚫ Security........... ✅  42 tests\n[7/7] 🟣 DB Integrity....... ✅  28 tests\n\n📊 Total: 568 tests in 35 files`,
        tip:"Hoặc generate từng layer: /generate-smoke, /generate-single users"},
      { n:10, who:"human", cmd:null, title:"Review generated tests", time:"1-3 giờ",
        what:"QC đọc qua tests, sửa/bổ sung nếu cần",
        human:["Smoke + Contract: scan nhanh 5 phút, thường OK","Single API: check business validation rules","Integration: check scenarios match business flow","RBAC: check permission matrix mapping","Security: check miss attack vector nào không","Thêm edge cases mà AI miss"],
        output:"Tests đã review + bổ sung",
        tip:"Focus review: Integration + RBAC + Security (AI yếu nhất). Smoke/Contract thường OK.",
        decision:{q:"Tests OK?",yes:"→ Tiếp tục /run",no:"→ Sửa file hoặc nhờ AI: 'sửa test INTG-003, thêm check stock'"}},
    ]
  },
  {
    phase: "PHASE 3: EXECUTE",
    icon: "🏃", color: "#f59e0b", time: "5-30 phút",
    steps: [
      { n:11, who:"ai", cmd:"/run", title:"Chạy tests", time:"5-30 phút",
        what:"AI execute tests theo thứ tự layer, fail fast",
        ai:["Chạy smoke trước — nếu fail → cảnh báo","Chạy từng layer theo thứ tự","Log mỗi test: pass/fail, response time","Failure: capture request + response + DB state","Cleanup test data sau mỗi suite"],
        output:"Test results (pass/fail per test)",
        term:`$ claude "/run"\n\n🏃 EXECUTING TESTS...\n\n🟢 Smoke (15)        ✅ 14 passed, ❌ 1 failed      [3s]\n🔵 Contract (23)     ✅ 21 passed, ❌ 2 failed      [8s]\n🟡 Single API (310)  ✅ 289 passed, ❌ 16 failed    [4m 12s]\n🟠 Integration (18)  ✅ 15 passed, ❌ 3 failed      [2m 45s]\n🔐 RBAC (132)        ✅ 127 passed, ❌ 5 failed     [3m 20s]\n⚫ Security (42)     ✅ 40 passed, ❌ 2 failed      [1m 50s]\n🟣 DB Integrity (28) ✅ 28 passed                    [45s]\n\n═══════════════════════════════════════\n📊 TOTAL: 568 | 534 ✅ | 29 ❌ | 5 ⏭\n   Pass rate: 94.0% | Duration: 12m 43s`,
        tip:"Chạy nhanh: /run smoke (30s). Chạy 1 resource: /run single users."},
    ]
  },
  {
    phase: "PHASE 4: REPORT & FIX",
    icon: "📊", color: "#ef4444", time: "15-30 phút",
    steps: [
      { n:12, who:"ai", cmd:"/report", title:"Sinh báo cáo chi tiết", time:"1-2 phút",
        what:"AI phân tích results, sinh 4 file report",
        ai:["reports/latest-report.md — Overview","reports/bugs-found.md — Mỗi failure = 1 bug report","reports/coverage-matrix.md — Endpoint × test type","reports/ai-summary.md — AI phân tích patterns, risks, recommendations"],
        output:"4 files trong reports/",
        term:`$ claude "/report"\n\n📊 Generating reports...\n\n✅ reports/latest-report.md\n✅ reports/bugs-found.md      (29 bugs, 4 critical)\n✅ reports/coverage-matrix.md (87% coverage)\n✅ reports/ai-summary.md\n\n🐛 BUG SUMMARY:\n   🔴 Critical: 4 (RBAC bypass, data leak)\n   🟠 High:     8 (validation missing)\n   🟡 Medium:  12 (schema mismatch)\n   🟢 Low:      5 (response time)`},
      { n:13, who:"human", cmd:null, title:"Đọc report, gửi bugs cho Dev", time:"15-30 phút",
        what:"QC đọc report, prioritize bugs, tạo tickets",
        human:["Đọc ai-summary.md trước (AI đã tổng hợp)","Đọc bugs-found.md — mỗi bug có steps to reproduce","Prioritize: Critical → High → Medium → Low","Tạo Jira/Linear tickets (copy từ bug report)"],
        output:"Bug tickets created, assigned to dev team",
        tip:"bugs-found.md format sẵn cho copy-paste vào Jira."},
      { n:14, who:"ai", cmd:"/run", title:"Re-test sau khi Dev fix", time:"5-15 phút",
        what:"Dev fix xong → QC chạy lại layer bị fail",
        ai:["Chạy lại chỉ tests bị fail","Compare kết quả với lần chạy trước"],
        output:"Updated test results",
        term:`$ claude "/run rbac"\n\n🔐 RBAC (132 tests)\n   ✅ 131 passed, ❌ 1 failed\n   └─ STILL FAILING: editor access admin endpoint`,
        decision:{q:"All pass?",yes:"→ /report final → sign off",no:"→ Gửi lại Dev → loop step 13-14"}},
    ]
  },
  {
    phase: "PHASE 5: HÀNG NGÀY (Ongoing)",
    icon: "🔄", color: "#8b5cf6", time: "5-30 phút/ngày",
    steps: [
      { n:15, who:"ai", cmd:"/run smoke", title:"Daily smoke test", time:"30 giây",
        what:"Mỗi sáng hoặc sau mỗi deploy, kiểm tra API sống",
        ai:["Chạy smoke tests","Alert nếu có failure"],
        output:"Quick health check",
        term:`$ claude "/run smoke"\n\n🟢 Smoke: 15/15 passed [3s]\n✅ API healthy`},
      { n:16, who:"human", cmd:null, title:"Khi Backend thay đổi API", time:"30 phút",
        what:"Backend push API changes → QC update và re-test",
        human:["Lấy OpenAPI spec mới từ backend","Copy đè input/openapi.yaml"],
        output:"Updated spec + re-generated tests",
        term:`$ cp new-openapi.yaml ./input/openapi.yaml\n$ claude "/analyze"     # detect changes\n$ claude "/generate-all"\n$ claude "/run"\n$ claude "/report"`},
      { n:17, who:"human", cmd:null, title:"Khi Business rules thay đổi", time:"30-60 phút",
        what:"PM thay đổi requirements → QC update test-rules.md",
        human:["Update test-rules.md với rules mới","Update permission matrix nếu roles thay đổi","Thêm/sửa integration scenarios"],
        output:"Updated rules + re-generated tests",
        term:`# Sửa test-rules.md\n$ claude "/assess"\n$ claude "/generate-integration"\n$ claude "/run integration"`},
      { n:18, who:"ai", cmd:"/run", title:"Trước release → Full regression", time:"30-60 phút",
        what:"Chạy toàn bộ test suite trước khi release",
        ai:["Chạy tất cả layers","Generate full report","So sánh với lần chạy trước"],
        output:"Full test report cho release sign-off",
        term:`$ claude "/run"\n$ claude "/report"\n$ claude "/coverage"\n# QC review → sign off hoặc block release`},
    ]
  },
];

function render() {
  const app = document.getElementById('app');
  let html = '';

  data.forEach((phase, pi) => {
    const dots = phase.steps.map(s =>
      `<div class="dot ${s.who === 'ai' ? 'dot-ai' : 'dot-human'}"></div>`
    ).join('');

    let stepsHtml = '';
    phase.steps.forEach((s, si) => {
      const isAi = s.who === 'ai';
      const whoClass = isAi ? 'ai' : 'human';
      const cmdHtml = s.cmd
        ? `<span class="step-cmd ${isAi ? '' : 'human-cmd'}">${s.cmd}</span>`
        : '';

      let detailHtml = '';

      if (s.ai) {
        detailHtml += `<div class="detail-section"><div class="detail-label ai-label">🤖 AI sẽ:</div>`;
        s.ai.forEach(a => { detailHtml += `<div class="detail-item">${a}</div>`; });
        detailHtml += '</div>';
      }
      if (s.human) {
        detailHtml += `<div class="detail-section"><div class="detail-label human-label">👤 QC làm:</div>`;
        s.human.forEach(h => { detailHtml += `<div class="detail-item">${h}</div>`; });
        detailHtml += '</div>';
      }
      if (s.term) {
        detailHtml += `<div class="terminal"><pre>${s.term}</pre></div>`;
      }
      if (s.output) {
        detailHtml += `<div class="detail-section"><div class="output-line"><span>Output: </span>${s.output}</div></div>`;
      }
      if (s.tip) {
        detailHtml += `<div class="tip">💡 ${s.tip}</div>`;
      }
      if (s.decision) {
        detailHtml += `<div class="decision">
          <div class="decision-q">🔀 Decision: ${s.decision.q}</div>
          <div class="decision-opt decision-yes">✅ Yes: ${s.decision.yes}</div>
          <div class="decision-opt decision-no">🔄 No: ${s.decision.no}</div>
        </div>`;
      }

      stepsHtml += `
        <div class="step" data-step="${pi}-${si}">
          <div class="step-header" onclick="toggleStep('${pi}-${si}')">
            <div class="step-num ${whoClass}">${s.n}</div>
            <div class="step-info">
              <div>${cmdHtml}<span class="step-name">${s.title}</span></div>
              <div class="step-what">${s.what}</div>
            </div>
            <div class="step-meta">
              <span class="badge badge-${whoClass}">${isAi ? '🤖 AI' : '👤 Human'}</span>
              <span class="step-time">⏱ ${s.time}</span>
            </div>
          </div>
          <div class="step-detail">${detailHtml}</div>
        </div>`;
    });

    html += `
      <div class="phase ${pi === 0 ? 'open' : ''}" data-phase="${pi}" style="border-color: ${phase.color}44">
        <div class="phase-header" style="background: ${phase.color}15" onclick="togglePhase(${pi})">
          <div class="phase-title">
            <span class="icon">${phase.icon}</span>
            <span class="name">${phase.phase}</span>
            <span class="time">${phase.time}</span>
          </div>
          <div class="phase-dots">${dots}</div>
        </div>
        <div class="phase-body">${stepsHtml}</div>
      </div>`;
  });

  html += `
    <div class="cheatsheet">
      <h3>⚡ Cheat Sheet — Copy & Paste</h3>
      <div class="cheatsheet-grid">
        <div class="cheatsheet-col">
          <h4>🏗️ Lần đầu (one-time)</h4>
          <div class="cmd">/init</div>
          <div class="human-note">&nbsp;&nbsp;điền config...</div>
          <div class="cmd">/assess</div>
          <div class="human-note">&nbsp;&nbsp;fix theo gợi ý...</div>
          <div class="cmd">/analyze</div>
          <div class="cmd">/generate-all</div>
          <div class="human-note">&nbsp;&nbsp;review tests...</div>
          <div class="cmd">/run</div>
          <div class="cmd">/report</div>
        </div>
        <div class="cheatsheet-col">
          <h4>🔄 Hàng ngày</h4>
          <div class="cmd">/run smoke</div>
          <div class="comment">(30s, sau mỗi deploy)</div>
          <h4 style="margin-top:16px">📦 Khi API thay đổi</h4>
          <div class="cmd">/analyze</div>
          <div class="cmd">/generate-all</div>
          <div class="cmd">/run</div>
          <div class="cmd">/report</div>
        </div>
        <div class="cheatsheet-col">
          <h4>🚀 Trước release</h4>
          <div class="cmd">/run</div>
          <div class="cmd">/report</div>
          <div class="cmd">/coverage</div>
          <div class="human-note">&nbsp;&nbsp;review → sign off</div>
          <h4 style="margin-top:16px">🎯 Debug 1 resource</h4>
          <div class="cmd">/generate-single users</div>
          <div class="cmd">/run single users</div>
        </div>
      </div>
    </div>
    <div class="legend">
      <div><span class="legend-dot" style="background:#22d3ee"></span> AI tự chạy</div>
      <div><span class="legend-dot" style="background:#f472b6"></span> Human cần làm</div>
      <div>Tổng workflow: ~4-6 giờ lần đầu, ~30 phút cho lần chạy lại</div>
    </div>`;

  app.innerHTML = html;
}

function togglePhase(idx) {
  const el = document.querySelector(`.phase[data-phase="${idx}"]`);
  el.classList.toggle('open');
}

function toggleStep(key) {
  const el = document.querySelector(`.step[data-step="${key}"]`);
  el.classList.toggle('open');
}

render();
</script>
</body>
</html>
